<section class="login-page">

    <div class="login-card">

        <h2>Admin Login</h2>

        <input
            class="form-control"
            type="text"
            placeholder="Username"
            [(ngModel)]="username">

        <input
            class="form-control mt-3"
            type="password"
            placeholder="Password"
            [(ngModel)]="password">

        <button
            class="btn btn-danger w-100 mt-4"
            (click)="login()">

            {{ loading ? 'Please Wait...' : 'Login' }}

        </button>

    </div>

</section>
